name: daily-scrape

on:
  schedule:
    - cron: "0 3 * * *"   # 03:00 UTC daily
  workflow_dispatch:
    inputs:
      max_pages:
        description: "Pages per category"
        required: false
        default: "3"
      verticals:
        description: "Space-separated verticals (blank = all)"
        required: false
        default: ""
      slow:
        description: "Human-pause scale (>1 = slower/safer)"
        required: false
        default: "1.5"

concurrency:
  group: daily-scrape
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium
          sudo apt-get update && sudo apt-get install -y xvfb

      - name: Run scraper (headful under xvfb, via residential proxy)
        env:
          DUBIZZLE_PROXY_SUBSCRIPTION_URL: ${{ secrets.DUBIZZLE_PROXY_SUBSCRIPTION_URL }}
        run: |
          ARGS="--proxy --max-pages ${{ github.event.inputs.max_pages || '3' }} --slow ${{ github.event.inputs.slow || '1.5' }}"
          for v in ${{ github.event.inputs.verticals }}; do ARGS="$ARGS --vertical $v"; done
          xvfb-run -a python -m scraper.main $ARGS

      - name: Commit snapshot
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "data: snapshot $(date -u +%Y-%m-%d)"
            git push
          fi
